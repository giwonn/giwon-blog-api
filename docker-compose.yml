name: giwon-blog-api

x-api-blog: &api-blog-common
  build:
    context: .
    dockerfile: Dockerfile.api-blog
  restart: unless-stopped
  expose:
    - "8080"
  networks:
    - blog-network
  environment:
    SPRING_DATASOURCE_URL: jdbc:postgresql://giwon-blog-db:5432/giwon_blog
    SPRING_DATASOURCE_USERNAME: giwon
    SPRING_DATASOURCE_PASSWORD: giwon1234
    IMAGE_STORAGE_PATH: /data/blog/images
    IMAGE_PUBLIC_URL: ${IMAGE_PUBLIC_URL:-http://giwon-blog-api-blog:8080/images}
    CORS_ALLOWED_ORIGINS: ${CORS_BLOG_ORIGINS:-http://localhost:3000}
  volumes:
    - blog-images:/data/blog/images
  depends_on:
    - postgres
  healthcheck:
    test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/articles"]
    interval: 10s
    timeout: 5s
    retries: 3

x-api-admin: &api-admin-common
  build:
    context: .
    dockerfile: Dockerfile.api-admin
  restart: unless-stopped
  expose:
    - "8081"
  networks:
    - blog-network
  environment:
    SPRING_DATASOURCE_URL: jdbc:postgresql://giwon-blog-db:5432/giwon_blog
    SPRING_DATASOURCE_USERNAME: giwon
    SPRING_DATASOURCE_PASSWORD: giwon1234
    IMAGE_STORAGE_PATH: /data/blog/images
    IMAGE_PUBLIC_URL: ${IMAGE_PUBLIC_URL:-http://giwon-blog-api-blog:8080/images}
    CORS_ALLOWED_ORIGINS: ${CORS_ADMIN_ORIGINS:-http://localhost:3001}
  volumes:
    - blog-images:/data/blog/images
  depends_on:
    - postgres
  healthcheck:
    test: ["CMD", "wget", "-q", "--spider", "http://localhost:8081/admin/articles"]
    interval: 10s
    timeout: 5s
    retries: 3

services:
  nginx:
    image: nginx:alpine
    container_name: giwon-blog-api-nginx
    restart: unless-stopped
    expose:
      - "8080"
      - "8081"
    networks:
      blog-network:
        aliases:
          - giwon-blog-api-blog
          - giwon-blog-api-admin
    volumes:
      - ./nginx:/etc/nginx/conf.d

  api-blog-blue:
    <<: *api-blog-common
    container_name: api-blog-blue

  api-blog-green:
    <<: *api-blog-common
    container_name: api-blog-green
    profiles: ["green"]

  api-admin-blue:
    <<: *api-admin-common
    container_name: api-admin-blue

  api-admin-green:
    <<: *api-admin-common
    container_name: api-admin-green
    profiles: ["green"]

  postgres:
    image: postgres:17
    container_name: giwon-blog-db
    restart: unless-stopped
    expose:
      - "5432"
    networks:
      - blog-network
    environment:
      POSTGRES_DB: giwon_blog
      POSTGRES_USER: giwon
      POSTGRES_PASSWORD: giwon1234
    volumes:
      - postgres-data:/var/lib/postgresql/data

networks:
  blog-network:
    external: true

volumes:
  postgres-data:
  blog-images:
