server:
  port: 8080

spring:
  application:
    name: giwon-blog-api
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  datasource:
    url: jdbc:postgresql://localhost:5432/giwon_blog
    username: giwon
    password: giwon1234
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

image:
  storage:
    path: ${IMAGE_STORAGE_PATH:/data/blog/images}
    public-url: ${IMAGE_PUBLIC_URL:http://localhost:8080/images}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
